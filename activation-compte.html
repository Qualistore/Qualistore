<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HygiPerf — Activation du compte</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="css/app.css">
</head>
<body style="background:#1d4ed8;min-height:100vh;display:flex;align-items:center;justify-content:center;margin:0;font-family:system-ui,-apple-system,sans-serif">

<div style="background:#fff;border-radius:12px;padding:32px;max-width:400px;width:90%;box-shadow:0 10px 40px rgba(0,0,0,.2)">
  <div style="text-align:center;margin-bottom:20px">
    <img src="assets/logo.png" style="width:120px;height:auto" alt="HygiPerf">
  </div>

  <h2 id="act-title" style="text-align:center;font-size:18px;margin-bottom:16px">Bienvenue — activez votre compte</h2>

  <div id="act-error" style="display:none;background:#fee2e2;color:#991b1b;padding:12px;border-radius:6px;margin-bottom:16px;font-size:14px"></div>
  <div id="act-success" style="display:none;background:#dcfce7;color:#166534;padding:12px;border-radius:6px;margin-bottom:16px;font-size:14px"></div>

  <div id="act-form" style="display:none">
    <div id="act-email-display" style="text-align:center;font-size:13px;color:#666;margin-bottom:14px"></div>

    <div style="margin-bottom:12px">
      <label style="display:block;font-size:13px;margin-bottom:4px">Choisissez votre mot de passe</label>
      <div class="pw-wrap" style="position:relative">
        <input type="password" id="act-pass" placeholder="••••••••" autocomplete="new-password"
          style="width:100%;box-sizing:border-box;padding:10px 40px 10px 10px;border:1px solid #ddd;border-radius:6px;font-size:14px">
        <button type="button" class="pw-eye" onclick="togglePass('act-pass', this)"
          style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#888;padding:4px">
          <i class="ti ti-eye"></i>
        </button>
      </div>
    </div>
    <div style="margin-bottom:16px">
      <label style="display:block;font-size:13px;margin-bottom:4px">Confirmez le mot de passe</label>
      <div class="pw-wrap" style="position:relative">
        <input type="password" id="act-pass-confirm" placeholder="••••••••" autocomplete="new-password"
          style="width:100%;box-sizing:border-box;padding:10px 40px 10px 10px;border:1px solid #ddd;border-radius:6px;font-size:14px"
          onkeydown="if(event.key==='Enter')confirmActivation()">
        <button type="button" class="pw-eye" onclick="togglePass('act-pass-confirm', this)"
          style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#888;padding:4px">
          <i class="ti ti-eye"></i>
        </button>
      </div>
    </div>

    <button id="act-submit-btn" onclick="confirmActivation()" style="width:100%;padding:12px;background:#1d4ed8;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:bold;cursor:pointer">
      Activer mon compte
    </button>
  </div>

  <div id="act-login-link" style="display:none;text-align:center;margin-top:12px">
    <a href="./" style="color:#1d4ed8;font-size:14px">Aller à la page de connexion</a>
  </div>
</div>

<!-- SDK Supabase (UMD) — DOIT être chargé avant js/supabase.js,
     sinon js/supabase.js ne trouve pas window.supabase et _sb ne
     sera jamais défini (c'était la cause de l'erreur précédente). -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script>
/**
 * Jeton d'activation extrait de l'URL (paramètre ?token_hash=...),
 * ou null si absent — auquel cas le lien est considéré invalide.
 * @type {string|null}
 */
let ACT_TOKEN_HASH = null;

/**
 * @param {string} id
 * @returns {HTMLElement}
 */
function el(id) { return document.getElementById(id); }

/**
 * Bascule l'affichage en clair / masqué d'un champ mot de passe, et
 * met à jour l'icône (œil ouvert/barré) du bouton associé.
 * @param {string} inputId
 * @param {HTMLButtonElement} btn
 * @returns {void}
 */
function togglePass(inputId, btn) {
  /** @type {HTMLInputElement} */
  const input = el(inputId);
  const icon = btn.querySelector('i');
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'ti ti-eye-off';
  } else {
    input.type = 'password';
    icon.className = 'ti ti-eye';
  }
}

/**
 * Point d'entrée : lit le token_hash dans l'URL au chargement de la
 * page (jamais de vérification automatique ici — la vérification
 * elle-même n'a lieu qu'au clic explicite de l'utilisateur sur
 * "Activer mon compte", pour éviter qu'un scanner de sécurité
 * d'email (Gmail, Brevo...) qui pré-visite ce lien ne consomme le
 * jeton à usage unique avant le vrai clic de l'utilisateur).
 * Vérifie aussi que _sb (client Supabase, défini par js/supabase.js)
 * a bien été chargé — sinon rien ne pourrait fonctionner plus loin.
 * @returns {void}
 */
function initActivation() {
  if (typeof _sb === 'undefined' || !_sb || !_sb.auth) {
    _showActError("Erreur technique : impossible de contacter le serveur (js/supabase.js n'a pas pu être chargé). Vérifiez votre connexion et rechargez la page.");
    return;
  }

  /** @type {URLSearchParams} */
  const params = new URLSearchParams(window.location.search);
  ACT_TOKEN_HASH = params.get('token_hash');

  if (!ACT_TOKEN_HASH) {
    _showActError("Lien invalide ou incomplet — contactez votre administrateur pour une nouvelle invitation.");
    return;
  }

  el('act-form').style.display = '';
}

/**
 * @param {string} message
 * @returns {void}
 */
function _showActError(message) {
  const errEl = el('act-error');
  errEl.textContent = message;
  errEl.style.display = '';
}

/**
 * Vérifie le jeton d'activation (verifyOtp, déclenché uniquement
 * ici, au clic), définit le mot de passe choisi, active le profil
 * (activate_own_profile), puis redirige DIRECTEMENT vers l'app —
 * la session ouverte par verifyOtp() reste valide (on ne déconnecte
 * plus l'utilisateur), donc index.html le reconnaît déjà
 * connecté et l'amène droit sur le tableau de bord.
 * Toute erreur (y compris une exception inattendue) est
 * systématiquement affichée à l'écran.
 * @returns {Promise<void>}
 */
async function confirmActivation() {
  const errEl = el('act-error');
  errEl.style.display = 'none';

  /** @type {HTMLButtonElement} */
  const submitBtn = el('act-submit-btn');

  try {
    /** @type {string} */
    const pass = el('act-pass').value;
    /** @type {string} */
    const passConfirm = el('act-pass-confirm').value;

    if (!pass || pass.length < 10) {
      _showActError('Le mot de passe doit contenir au moins 10 caractères.');
      return;
    }
    if (pass !== passConfirm) {
      _showActError('Les mots de passe ne correspondent pas.');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Activation en cours...';

    const { data: verifyData, error: verifyError } = await _sb.auth.verifyOtp({
      token_hash: ACT_TOKEN_HASH,
      type: 'invite',
    });

    if (verifyError) {
      _showActError("Ce lien d'invitation n'est plus valide (déjà utilisé ou expiré) : " + verifyError.message);
      return;
    }

    const { error: updateError } = await _sb.auth.updateUser({ password: pass });
    if (updateError) {
      _showActError("Erreur lors de l'enregistrement du mot de passe : " + updateError.message);
      return;
    }

    const { error: rpcError } = await _sb.rpc('activate_own_profile');
    if (rpcError) {
      _showActError("Erreur lors de l'activation du compte : " + rpcError.message);
      return;
    }

    // Pas de signOut() ici : on garde la session ouverte par
    // verifyOtp()/updateUser() pour amener directement l'utilisateur
    // dans l'app, déjà connecté.
    el('act-form').style.display = 'none';
    el('act-title').style.display = 'none';
    const successEl = el('act-success');
    successEl.textContent = 'Compte activé ! Redirection vers l\'application...';
    successEl.style.display = '';

    setTimeout(() => { window.location.href = './'; }, 900);
  } catch (err) {
    _showActError('Erreur technique inattendue : ' + String(err && err.message ? err.message : err));
  } finally {
    if (submitBtn) {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Activer mon compte';
    }
  }
}

initActivation();
</script>
</body>
</html>
