<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QualiStore — Nouveau mot de passe</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.10.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<!--
  PAGE AUTONOME — finalisation de réinitialisation de mot de passe.
  ⚠️ NOUVEAU FICHIER (ne remplace ni index.html ni Qualistore.html).
  N'utilise QUE js/supabase.js (client Supabase) — aucune dépendance
  vers auth.js / storage.js / ui.js / init.js, volontairement, pour
  rester complètement isolée du reste de l'application (buildSidebar,
  navigate, etc. n'ont aucun sens ici et n'existent pas sur cette page).
-->
<div class="login-wrap" id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <img src="assets/logo.png" style="width:140px;height:auto;margin-bottom:8px" alt="QualiStore">
      <p style="color:var(--text2);font-size:13px;margin-top:4px">Nouveau mot de passe</p>
    </div>

    <div class="login-err" id="reset-msg" style="display:none"></div>

    <div id="reset-form">
      <p class="tsm tm" style="margin-bottom:14px">Choisissez votre nouveau mot de passe (10 caractères minimum).</p>
      <div class="form-group">
        <label class="form-label">Nouveau mot de passe</label>
        <div class="pw-wrap">
          <input class="form-control" type="password" id="f-reset-pass" placeholder="••••••••" autocomplete="new-password">
          <button class="pw-eye" type="button" onclick="_togglePass('f-reset-pass',this)"><i class="ti ti-eye"></i></button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Confirmer le mot de passe</label>
        <input class="form-control" type="password" id="f-reset-pass-confirm" placeholder="••••••••" autocomplete="new-password" onkeydown="if(event.key==='Enter')confirmReset()">
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:11px" onclick="confirmReset()">
        <i class="ti ti-check"></i> Valider le nouveau mot de passe
      </button>
    </div>

    <div id="reset-success" style="display:none;text-align:center">
      <p class="tsm tm" style="margin-bottom:14px">Mot de passe mis à jour avec succès.</p>
      <a class="btn btn-primary" style="width:100%;justify-content:center;padding:11px" href="./Qualistore.html">
        <i class="ti ti-login"></i> Se connecter
      </a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase.js"></script>
<script>
// ─────────────────────────────────────────────
// Lecture du jeton (token_hash) déposé dans le fragment d'URL par le
// lien reçu par email (voir requestPasswordReset, auth.js, et le
// template "Reset Password" côté Supabase Dashboard).
// ⚠️ Le jeton n'est PAS envoyé à Supabase ici — seulement stocké en
// mémoire. Il n'est transmis pour vérification (verifyOtp) qu'au
// clic explicite sur "Valider le nouveau mot de passe" (confirmReset,
// ci-dessous) — jamais au simple chargement de cette page. Nécessaire
// pour ne pas se faire griller le jeton par les scanners de sécurité
// des messageries (Gmail, le suivi de clics de Brevo...) qui
// pré-chargent automatiquement les liens des emails.
// ─────────────────────────────────────────────
(function () {
  var params = new URLSearchParams(window.location.hash.slice(1));
  var tokenHash = params.get('token_hash');

  if (!tokenHash || params.get('type') !== 'recovery') {
    document.getElementById('reset-form').style.display = 'none';
    var msg = document.getElementById('reset-msg');
    msg.textContent = 'Lien invalide ou incomplet — merci de redemander une réinitialisation depuis la page de connexion.';
    msg.style.display = 'flex';
  }

  window._resetTokenHash = tokenHash;
})();

/**
 * Bascule la visibilité d'un champ mot de passe (identique à togglePass, auth.js).
 * @param {string} inputId
 * @param {HTMLElement} toggleButton
 * @returns {void}
 */
function _togglePass(inputId, toggleButton) {
  var input = document.getElementById(inputId);
  var isHidden = input.type === 'password';
  input.type = isHidden ? 'text' : 'password';
  toggleButton.innerHTML = isHidden ? '<i class="ti ti-eye-off"></i>' : '<i class="ti ti-eye"></i>';
}

/**
 * Valide le formulaire, vérifie le jeton auprès de Supabase (verifyOtp
 * — c'est ici, et seulement ici, qu'il est consommé) puis applique le
 * nouveau mot de passe.
 * @returns {Promise<void>}
 */
async function confirmReset() {
  var newPassword = document.getElementById('f-reset-pass').value;
  var confirmPassword = document.getElementById('f-reset-pass-confirm').value;
  var msg = document.getElementById('reset-msg');

  if (!newPassword || newPassword.length < 10) {
    msg.textContent = 'Le mot de passe doit contenir au moins 10 caractères.';
    msg.className = 'login-err show';
    return;
  }
  if (newPassword !== confirmPassword) {
    msg.textContent = 'Les deux mots de passe ne correspondent pas.';
    msg.className = 'login-err show';
    return;
  }
  if (!window._resetTokenHash) {
    msg.textContent = 'Lien invalide — merci de redemander une réinitialisation.';
    msg.className = 'login-err show';
    return;
  }

  var verifyResult = await _sb.auth.verifyOtp({ token_hash: window._resetTokenHash, type: 'recovery' });
  if (verifyResult.error) {
    msg.textContent = 'Ce lien a expiré ou a déjà été utilisé — merci de redemander une réinitialisation.';
    msg.className = 'login-err show';
    return;
  }

  var updateResult = await _sb.auth.updateUser({ password: newPassword });
  if (updateResult.error) {
    msg.textContent = 'Erreur : ' + updateResult.error.message;
    msg.className = 'login-err show';
    return;
  }

  history.replaceState(null, '', window.location.pathname);
  await _sb.auth.signOut();

  document.getElementById('reset-form').style.display = 'none';
  msg.style.display = 'none';
  document.getElementById('reset-success').style.display = 'block';
}
</script>
</body>
</html>
